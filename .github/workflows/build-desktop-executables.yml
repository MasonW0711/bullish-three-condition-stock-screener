name: Build desktop executables

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            archive_name: BullishThreeConditionStockScreener-windows-x64.zip
            dist_path: dist/BullishThreeConditionStockScreener
          - os: macos-13
            archive_name: BullishThreeConditionStockScreener-macos-intel.zip
            dist_path: dist/BullishThreeConditionStockScreener.app
          - os: macos-14
            archive_name: BullishThreeConditionStockScreener-macos-apple-silicon.zip
            dist_path: dist/BullishThreeConditionStockScreener.app

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Record resolved versions (reproducibility lockfile)
        shell: bash
        run: python -m pip freeze > requirements-lock-${{ runner.os }}.txt

      - name: Build desktop bundle
        run: python scripts/build_desktop.py

      - name: Archive Windows bundle
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ matrix.dist_path }}" -DestinationPath "${{ matrix.archive_name }}" -Force

      - name: Archive macOS bundle
        if: runner.os == 'macOS'
        run: |
          ditto -c -k --sequesterRsrc --keepParent "${{ matrix.dist_path }}" "${{ matrix.archive_name }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: ${{ matrix.archive_name }}
          if-no-files-found: error

      - name: Attach archive to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.archive_name }}
            requirements-lock-${{ runner.os }}.txt
